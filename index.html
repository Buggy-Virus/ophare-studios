<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>OPHare Studios</title>
  <meta name="description" content="A landing portal to web applications and games developed by OPHare Studios.">

  <link rel="stylesheet" href="style.css">
  
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="manifest" href="assets/manifest.json">
  <meta name="theme-color" content="#ffffff">
</head>
<body>

  <header class="c-site-header" role="banner">
    <div class="c-h-wrapper">
      <a class="c-site-title" href="./">OPHare Studios</a>
      <nav class="c-site-nav">
        <div class="trigger">
          <a class="page-link" href="https://buggy-virus.github.io" target="_blank">Oliver Hare</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="c-page-content" aria-label="Content">
    <div class="c-d-wrapper">
      <h1 class="page-heading">OPHare Studios Portal</h1>
      <p class="welcome-text">
        Welcome to OPHare Studios, a hosting directory for custom web applications, tactical simulation tools, and games. Explore the projects below to launch the respective web instances.
      </p>

      <div class="projects-container">
        <!-- Potluck -->
        <div class="c-project">
          <a class="c-project-link" href="potluck/">
            <div class="c-project-title-box">
              <h2 class="c-project-title">Potluck</h2>
            </div>
          </a>
          <a class="c-project-image-link" href="potluck/">
            <img src="assets/blank.png" alt="Potluck - Tactical Procedural RPG" style="width:355px;height:150px;">
          </a>
          <div class="c-project-bar">
            <p class="c-project-date">Feb, 2020</p>
            <a href="potluck/">
              <div class="c-project-page-icon" title="View Application"></div>
            </a>
            <a href="https://github.com/Buggy-Virus/potluck" target="_blank">
              <div class="c-project-github-icon" title="GitHub Repository"></div>
            </a>
          </div>
        </div>

        <!-- Daedalus -->
        <div class="c-project">
          <a class="c-project-link" href="daedalus/">
            <div class="c-project-title-box">
              <h2 class="c-project-title">Daedalus</h2>
            </div>
          </a>
          <a class="c-project-image-link" href="daedalus/">
            <img src="assets/blank.png" alt="Daedalus - Virtual Tabletop Utility" style="width:355px;height:150px;">
          </a>
          <div class="c-project-bar">
            <p class="c-project-date">Oct, 2018</p>
            <a href="daedalus/">
              <div class="c-project-page-icon" title="View Application"></div>
            </a>
            <a href="https://github.com/Buggy-Virus/daedalus-0.1" target="_blank">
              <div class="c-project-github-icon" title="GitHub Repository"></div>
            </a>
          </div>
        </div>

        <!-- Bridge Troll -->
        <div class="c-project">
          <a class="c-project-link" href="bridge_troll/">
            <div class="c-project-title-box">
              <h2 class="c-project-title">Bridge Troll</h2>
            </div>
          </a>
          <a class="c-project-image-link" href="bridge_troll/">
            <img src="assets/blank.png" alt="Bridge Troll - Godot C# Simulation" style="width:355px;height:150px;">
          </a>
          <div class="c-project-bar">
            <p class="c-project-date">Jun, 2024</p>
            <a href="bridge_troll/">
              <div class="c-project-page-icon" title="View Application"></div>
            </a>
            <a href="https://github.com/Buggy-Virus/bridge_troll" target="_blank">
              <div class="c-project-github-icon" title="GitHub Repository"></div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="c-site-footer">
    <div class="wrapper">
      <div class="c-center-wrapper">
        <div class="c-icon-contact">
          <a href="https://buggy-virus.github.io/contact" target="_blank">
            <span class="c-link-spanner"></span>
          </a>
        </div>
        <div class="c-icon-twitter">
          <a href="https://twitter.com/Buggy_Virus" target="_blank">
            <span class="c-link-spanner"></span>
          </a>
        </div>
        <div class="c-icon-github">
          <a href="https://github.com/Buggy-Virus" target="_blank">
            <span class="c-link-spanner"></span>
          </a>
        </div>
        <div class="c-icon-linkedin">
          <a href="https://www.linkedin.com/in/oliver-hare/" target="_blank">
            <span class="c-link-spanner"></span>
          </a>
        </div>
      </div>
    </div>

    <!-- Preloader for hover states -->
    <div class="c-preload">
      <img src="assets/page-icon-24.png" alt="preload">
      <img src="assets/github-icon-24.png" alt="preload">
      <img src="assets/lock-icon-24.png" alt="preload">
      <img src="assets/mail-fav.png" alt="preload">
      <img src="assets/twitter-fav.png" alt="preload">
      <img src="assets/github-fav.png" alt="preload">
      <img src="assets/linkedin-fav.png" alt="preload">
    </div>
  </footer>

</body>
</html>
